name: Atualizar dashboard

on:
  schedule:
    # A cada 30 minutos. UTC. Considera ~3min de defasagem do cron do GitHub.
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # botão manual em Actions

permissions:
  contents: write

concurrency:
  group: atualizar
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    # Secrets vivem no environment "production" (configurar em Settings → Environments).
    # Deploy branches restrito a "main" → workflows em outras branches NÃO veem os secrets.
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar dados (mês corrente)
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          META_ADS_TOKEN: ${{ secrets.META_ADS_TOKEN }}
          META_ADS_TOKEN_EUA: ${{ secrets.META_ADS_TOKEN_EUA }}
          META_ADS_TOKEN_LIVRE_IR: ${{ secrets.META_ADS_TOKEN_LIVRE_IR }}
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
        run: python scripts/coletar.py

      - name: Commitar se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if git diff --cached --quiet; then
            echo "Nada mudou."
          else
            git commit -m "auto: atualiza data.json $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
