/* ---------- render ---------- */
let filter="all";
function counts(){
  document.getElementById('cTot').textContent=DATA.length;
  document.getElementById('cLive').textContent=DATA.filter(d=>d.status==='live').length;
  document.getElementById('cWarn').textContent=DATA.filter(d=>d.status==='warn').length;
  document.getElementById('cPlan').textContent=DATA.filter(d=>d.status==='plan').length;
}
function render(){
  const g=document.getElementById('grid'); g.innerHTML="";
  DATA.filter(d=>{
    if(filter==="all")return true;
    if(filter.startsWith("cat:"))return d.cat===filter.slice(4);
    return d.status===filter;
  }).forEach(d=>{
    const s=STATUS[d.status];
    const el=document.createElement('div');
    el.className="card "+s.card;
    el.innerHTML=`
      <div class="row1">
        <div class="num">${String(d.id).padStart(2,'0')}</div>
        <h3>${d.title}</h3>
      </div>
      <div class="tagline">${d.tagline}</div>
      <div class="row3">
        <span class="cat-chip">${d.cat}</span>
        <span class="status ${s.cls}"><span class="dot"></span>${s.label}</span>
      </div>`;
    el.addEventListener('click',()=>openModal(d));
    g.appendChild(el);
  });
}
function openModal(d){
  const s=STATUS[d.status];
  const m=document.getElementById('modal');
  m.innerHTML=`
    <div class="m-head">
      <div class="m-num">${String(d.id).padStart(2,'0')}</div>
      <div class="m-titles">
        <h2>${d.title}</h2>
        <div class="m-meta">
          <span class="status ${s.cls}"><span class="dot"></span>${s.label}</span>
          <span class="cat-chip">${d.cat}</span>
          <span class="m-valid">${d.valid}</span>
        </div>
      </div>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body">
      <div class="sec"><h4>O que faz</h4><p>${d.oque}</p></div>
      <div class="sec"><h4>Fluxo</h4><pre>${d.fluxo}</pre></div>
      <div class="two-col">
        <div class="sec"><h4>Stack</h4><p>${d.stack}</p></div>
        <div class="sec"><h4>Como executar / verificar</h4><p>${d.exec}</p></div>
      </div>
      <div class="sec"><h4>Onde vive</h4><div class="paths">${d.vive.map(v=>`<code>${v}</code>`).join("")}</div></div>
      <div class="sec"><h4>Pendências ${d.pend.length?`(${d.pend.length})`:""}</h4>
        ${d.pend.length
          ? `<ul class="pendl">${d.pend.map(p=>`<li>${p}</li>`).join("")}</ul>`
          : `<ul class="pendl"><li class="ok">Nenhuma pendência aberta</li></ul>`}
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay')closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); filter=b.dataset.f; render();
});
counts(); render();
</script>
