<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escritório Virtual 3D — Agentes Silva Pimenta</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(circle at 50% 0%,#241a36 0%,#140e1f 70%);font-family:'Inter','Segoe UI',system-ui,sans-serif;
    color:#fff;overflow:hidden}
  #app{position:fixed;inset:0}
  canvas{display:block}
  /* topo */
  .top{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 18px 24px;
    background:linear-gradient(180deg,rgba(14,9,24,.85),transparent);pointer-events:none}
  .title{display:flex;align-items:center;gap:10px;justify-content:center}
  .title h1{font-size:18px;font-weight:800;letter-spacing:1px;color:#e9c98f;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  .sub{text-align:center;font-size:11px;color:#bfa9d6;margin-top:3px}
  .hud{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;pointer-events:auto}
  .hud span{background:rgba(23,16,36,.82);border:1px solid #46355e;padding:6px 14px;font-size:11px;border-radius:20px;
    backdrop-filter:blur(6px);box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .hud b{color:#e9c98f;font-weight:700}
  /* labels 3D */
  .lbl3d{pointer-events:none;text-align:center;transform:translateY(-6px)}
  .lbl3d .nm{font-size:11px;font-weight:700;color:#fff;background:rgba(15,10,24,.78);padding:2px 9px;border-radius:8px;
    border:1px solid #46355e;white-space:nowrap;text-shadow:0 1px 2px #000}
  .lbl3d .role{display:block;font-size:8.5px;color:#bfa9d6;font-weight:500;margin-top:1px}
  .chip{display:inline-block;margin-top:4px;font-size:8.5px;font-weight:700;padding:2px 9px;border-radius:10px;
    white-space:nowrap;letter-spacing:.4px}
  .c-ok{background:#10331f;color:#3DDC84;border:1px solid #1d5c39}
  .c-type{background:#0e2a3a;color:#6fd3ff;border:1px solid #1c5876}
  .c-err{background:#3a1012;color:#ff5d5d;border:1px solid #7c1d22;animation:blink 1s infinite}
  .c-zzz{background:#1c2440;color:#9bb7ff;border:1px solid #34487e}
  .c-boss{background:#3a2c12;color:#e9c98f;border:1px solid #7c5e24}
  @keyframes blink{50%{opacity:.45}}
  .balloon{pointer-events:none;font-size:11px;font-weight:800;padding:6px 11px;border-radius:10px;white-space:nowrap;
    background:#fff;color:#111;border:2px solid #111;box-shadow:0 4px 12px rgba(0,0,0,.5);transform:translateY(-44px)}
  .balloon.err{background:#ffe1e1;border-color:#a40000;color:#a40000;animation:shake .5s infinite}
  @keyframes shake{25%{transform:translateY(-44px) translateX(-3px)}75%{transform:translateY(-44px) translateX(3px)}}
  /* dica + toast */
  .foot{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;align-items:center;
    flex-wrap:wrap;justify-content:center}
  .foot .t{background:rgba(23,16,36,.82);border:1px solid #46355e;color:#cdbbe2;font-size:10.5px;padding:6px 14px;
    border-radius:20px;backdrop-filter:blur(6px)}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(8,5,15,.82);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .overlay.show{display:flex}
  .modal{background:#1b1228;border:2px solid #C5A57A;border-radius:14px;max-width:540px;width:100%;padding:24px;font-size:12.5px;
    box-shadow:0 20px 60px rgba(0,0,0,.7)}
  .modal h2{color:#e9c98f;font-size:16px;margin-bottom:10px}
  .modal p,.modal li{line-height:1.7;color:#e8def5}
  .modal ul{padding-left:18px;margin:6px 0}
  .modal a{color:#3DDC84}
  .modal .fechar{margin-top:16px;background:#C5A57A;color:#1b1228;border:none;padding:9px 18px;font-family:inherit;
    font-weight:700;cursor:pointer;border-radius:8px}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;color:#bfa9d6;
    font-size:13px;background:#140e1f}
</style>
</head>
<body>
  <div id="app"></div>
  <div id="loading">carregando o escritório 3D…</div>

  <div class="top">
    <div class="title"><span style="font-size:22px">🏢</span><h1>ESCRITÓRIO VIRTUAL 3D · SILVA PIMENTA</h1></div>
    <div class="sub">agentes de automação ao vivo · Mauro vigia tudo · status real do Make a cada 60s</div>
    <div class="hud">
      <span>🟢 trabalhando: <b id="hWork">–</b></span>
      <span>☕ ociosos: <b id="hIdle">–</b></span>
      <span>⚠️ erros: <b id="hErr">–</b></span>
      <span>👔 Mauro: <b id="hBoss">vigiando</b></span>
      <span>🕐 <b id="hTime">–</b></span>
    </div>
  </div>

  <div class="foot">
    <span class="t" id="toast">conectando ao Make…</span>
    <span class="t">🖱️ arraste pra girar · role pra zoom · clique num agente</span>
  </div>

  <div class="overlay" id="ov"><div class="modal" id="md"></div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const STATUS_URL = 'https://sp-tag-lead-filter-x7k2.pages.dev/status';

// key bate com o /status do worker; nomes novos (personificação)
const AGENTES = [
  { key:'taglead', nome:'Téo',    role:'Tag Lead · capta WhatsApp', pos:[-7,0,-1], shirt:'#1A4758', hair:'#3a2415' },
  { key:'cadaux',  nome:'Aurora', role:'Cadastro Auxílio Moradia',  pos:[-2.3,0,-1], shirt:'#7a3aa8', hair:'#101010' },
  { key:'cadfies', nome:'Fábio',  role:'Cadastro FIES',             pos:[2.4,0,-1], shirt:'#b8762a', hair:'#5a3214' },
  { key:'cadsusp', nome:'Sueli',  role:'Cadastro Suspensão FIES',   pos:[-4.6,0,4.2], shirt:'#2e7d4f', hair:'#241a10' },
  { key:'hubspot', nome:'Hugo',   role:'HubSpot (em breve)',        pos:[0.2,0,4.2], shirt:'#6b6b78', hair:'#3a3a3a', fixo:'zzz' },
];

const PENDENCIAS = [
  '#14 UTM Tracking — implementar nível 1',
  '#16 Bot IA Magalhães — deploy Fly.io (vira agente 24/7)',
  '#17 HubSpot × Pipedrive — aguardando acessos da seguradora',
];

// ---------- cena ----------
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#140e1f');
scene.fog = new THREE.Fog('#140e1f', 22, 46);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(2.5, 14, 19.5);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position='fixed';
labelRenderer.domElement.style.top='0';
labelRenderer.domElement.style.pointerEvents='none';
app.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2.2, 1.4, 1.5);
controls.enableDamping = true; controls.dampingFactor = .08;
controls.maxPolarAngle = Math.PI/2.15; controls.minDistance = 8; controls.maxDistance = 30;
controls.autoRotate = false;

// ---------- luz ----------
scene.add(new THREE.HemisphereLight('#d6c6ff', '#4a3f33', 0.9));
const key = new THREE.DirectionalLight('#fff3da', 1.25);
key.position.set(8, 16, 10); key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=1; key.shadow.camera.far=60;
key.shadow.camera.left=-22; key.shadow.camera.right=22; key.shadow.camera.top=22; key.shadow.camera.bottom=-22;
key.shadow.bias=-0.0004;
scene.add(key);
scene.add(new THREE.AmbientLight('#7a6a9a', 0.5));

// ---------- piso + tapete + paredes ----------
const floorMat = new THREE.MeshStandardMaterial({ color:'#c89e63', roughness:.95 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(60,60), floorMat);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
// tabuleiro sutil
const tile = new THREE.Mesh(new THREE.PlaneGeometry(26,20),
  new THREE.MeshStandardMaterial({ color:'#b98e54', roughness:.9 }));
tile.rotation.x=-Math.PI/2; tile.position.set(-1,0.01,1.5); tile.receiveShadow=true; scene.add(tile);
// tapete da área de trabalho
const rug = new THREE.Mesh(new THREE.PlaneGeometry(20,12),
  new THREE.MeshStandardMaterial({ color:'#5a3a6a', roughness:1 }));
rug.rotation.x=-Math.PI/2; rug.position.set(-2.3,0.02,1.5); rug.receiveShadow=true; scene.add(rug);

function wall(w,h,d,x,y,z,color){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({ color, roughness:.9 }));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
wall(26,5,0.5,-1,2.5,-8.4,'#5a4565');   // parede de trás
wall(0.5,5,20,-14.2,2.5,1.6,'#4f3c5c'); // parede esquerda
// painel decorativo / placa na parede de trás
const placa = new THREE.Mesh(new THREE.BoxGeometry(6,1.5,0.2),
  new THREE.MeshStandardMaterial({color:'#143a48',emissive:'#0c2630',emissiveIntensity:.4,roughness:.5}));
placa.position.set(-8,3.4,-8.1); scene.add(placa);
const placaTxt = document.createElement('div');
placaTxt.className='lbl3d'; placaTxt.innerHTML='<div class="nm" style="background:#143a48;border-color:#0c2630;letter-spacing:2px">SILVA PIMENTA</div>';
const placaObj = new CSS2DObject(placaTxt); placaObj.position.set(-8,3.4,-7.9); scene.add(placaObj);

// TVs na parede (dashboards)
const TVS = {
  orcamento:['📺 Dashboard de Orçamento','Atualiza sozinho a cada 30 min (GitHub Actions).','https://silvapimentadireitomedico-cpu.github.io/gestao-trafego-sp-x9k4/'],
  juridico:['📺 Dashboard Jurídico','Na TV do escritório 24/7, atualiza a cada 30s.','https://silvapimentadireitomedico-cpu.github.io/dashboard-juridico-silva-pimenta/'],
  encerr:['📺 Dashboard Encerramentos','Na TV do escritório, aba mensal automática.','https://silvapimentadireitomedico-cpu.github.io/dashboard-encerramentos-silva-pimenta/'],
};
const clickables = [];
['orcamento','juridico','encerr'].forEach((k,i)=>{
  const tv = new THREE.Mesh(new THREE.BoxGeometry(3,1.7,0.18),
    new THREE.MeshStandardMaterial({color:'#0c0c14',emissive:'#1d5c39',emissiveIntensity:.5,roughness:.4}));
  tv.position.set(-0.5 + i*3.6, 3.2, -8.0); tv.userData={tv:k}; scene.add(tv); clickables.push(tv);
  const l=document.createElement('div'); l.className='lbl3d';
  l.innerHTML=`<div class="role" style="color:#d8c8ea">${TVS[k][0]}</div>`;
  const o=new CSS2DObject(l); o.position.copy(tv.position); o.position.y-=1.15; scene.add(o);
});

// ---------- fábrica de personagem ----------
function makePerson({shirt, hair, skin='#e8b88a', standing=false, tie=null}){
  const g = new THREE.Group();
  const mShirt = new THREE.MeshStandardMaterial({color:shirt, roughness:.75});
  const mSkin  = new THREE.MeshStandardMaterial({color:skin, roughness:.85});
  const mHair  = new THREE.MeshStandardMaterial({color:hair, roughness:.95});
  const torsoH = standing?1.15:0.85;
  const baseY = standing?0.0:0.35;
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.45,torsoH,8,16), mShirt);
  torso.position.y = baseY+0.95; torso.castShadow=true; g.add(torso);
  if(tie){ const t=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.55,0.06),new THREE.MeshStandardMaterial({color:tie}));
    t.position.set(0,baseY+1.05,0.43); g.add(t); }
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.36,24,20), mSkin);
  head.position.y = baseY+1.95; head.castShadow=true; g.add(head);
  const hairM = new THREE.Mesh(new THREE.SphereGeometry(0.385,24,20,0,Math.PI*2,0,Math.PI*0.58), mHair);
  hairM.position.y = head.position.y+0.05; hairM.castShadow=true; g.add(hairM);
  const armGeo = new THREE.CapsuleGeometry(0.14,0.62,6,10);
  const armL = new THREE.Mesh(armGeo,mShirt); armL.position.set(-0.55,baseY+0.95,0.12); armL.rotation.z=0.18; armL.castShadow=true;
  const armR = new THREE.Mesh(armGeo,mShirt); armR.position.set(0.55,baseY+0.95,0.12); armR.rotation.z=-0.18; armR.castShadow=true;
  g.add(armL,armR);
  // pernas (só em pé aparece bem)
  if(standing){
    const legGeo=new THREE.CapsuleGeometry(0.17,0.7,6,10); const mLeg=new THREE.MeshStandardMaterial({color:'#2b2740',roughness:.8});
    const lL=new THREE.Mesh(legGeo,mLeg); lL.position.set(-0.22,0.05,0); lL.castShadow=true;
    const lR=new THREE.Mesh(legGeo,mLeg); lR.position.set(0.22,0.05,0); lR.castShadow=true;
    g.add(lL,lR); g.userData.legs=[lL,lR];
  }
  g.userData.parts={head,armL,armR,torso,baseY};
  return g;
}
// cadeira simples
function makeChair(){
  const g=new THREE.Group(); const m=new THREE.MeshStandardMaterial({color:'#2a2438',roughness:.7});
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.16,0.9),m); seat.position.y=0.62; seat.castShadow=true;
  const back=new THREE.Mesh(new THREE.BoxGeometry(0.9,1.0,0.14),m); back.position.set(0,1.1,-0.4); back.castShadow=true;
  g.add(seat,back); return g;
}
// mesa + monitor
function makeDesk(){
  const g=new THREE.Group();
  const wood=new THREE.MeshStandardMaterial({color:'#7a4f2a',roughness:.6});
  const top=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.16,1.2),wood); top.position.y=1.0; top.castShadow=top.receiveShadow=true; g.add(top);
  [[-1.05,-0.5],[1.05,-0.5],[-1.05,0.5],[1.05,0.5]].forEach(([x,z])=>{
    const l=new THREE.Mesh(new THREE.BoxGeometry(0.13,1,0.13),wood); l.position.set(x,0.5,z); l.castShadow=true; g.add(l);});
  const mon=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.66,0.08),new THREE.MeshStandardMaterial({color:'#10101c',roughness:.4}));
  mon.position.set(0,1.52,0.15); mon.rotation.x=0.12; g.add(mon);
  const scrMat=new THREE.MeshStandardMaterial({color:'#0e3a52',emissive:'#0e3a52',emissiveIntensity:.6,roughness:.3});
  const scr=new THREE.Mesh(new THREE.PlaneGeometry(0.86,0.52),scrMat); scr.position.set(0,1.52,0.205); scr.rotation.x=0.12; g.add(scr);
  const stand=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.18,0.12),new THREE.MeshStandardMaterial({color:'#2b2b3d'}));
  stand.position.set(0,1.18,0.15); g.add(stand);
  // xícara de café (idle)
  const cup=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.08,0.14,12),new THREE.MeshStandardMaterial({color:'#f4ead2'}));
  cup.position.set(0.7,1.16,0.3); cup.visible=false; g.add(cup);
  g.userData={scrMat, cup};
  return g;
}
// planta decorativa
function planta(x,z){
  const g=new THREE.Group();
  const vaso=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.2,0.4,12),new THREE.MeshStandardMaterial({color:'#a3502e',roughness:.8}));
  vaso.position.y=0.2; vaso.castShadow=true;
  const folha=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,10),new THREE.MeshStandardMaterial({color:'#2e8b4f',roughness:.9}));
  folha.position.y=0.75; folha.scale.set(1,1.3,1); folha.castShadow=true;
  g.add(vaso,folha); g.position.set(x,0,z); scene.add(g);
}
planta(-13,-6.5); planta(7.5,-6.5); planta(-13,8);

// ---------- pilha de pendências (falta automatizar) ----------
const pilha = new THREE.Group(); pilha.position.set(-9.2,0,6.4); scene.add(pilha);
['#b98b24','#c99a30','#d9a93e','#e9b94e'].forEach((c,i)=>{
  const w=1.5-i*0.2;
  const f=new THREE.Mesh(new THREE.BoxGeometry(w,0.24,1.05),new THREE.MeshStandardMaterial({color:c,roughness:.7}));
  f.position.y=0.12+i*0.26; f.rotation.y=(i%2?0.06:-0.05); f.castShadow=true; f.receiveShadow=true; pilha.add(f);
});
const papel=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.05,0.52),new THREE.MeshStandardMaterial({color:'#f4ead2',roughness:.8}));
papel.position.y=0.12+4*0.26; papel.castShadow=true; pilha.add(papel);
const pilhaHit=new THREE.Mesh(new THREE.BoxGeometry(1.8,1.8,1.4),new THREE.MeshBasicMaterial({visible:false}));
pilhaHit.position.y=0.7; pilhaHit.userData={pilha:true}; pilha.add(pilhaHit); clickables.push(pilhaHit);
const pilhaLbl=document.createElement('div'); pilhaLbl.className='lbl3d';
pilhaLbl.innerHTML=`<div class="nm" style="background:#3a2c12;border-color:#7c5e24;color:#ffd98a">📂 PENDÊNCIAS<span class="role">${PENDENCIAS.length} pra automatizar</span></div>`;
const pilhaObj=new CSS2DObject(pilhaLbl); pilhaObj.position.set(0,1.8,0); pilha.add(pilhaObj);

// ---------- estações ----------
const stations = {};
AGENTES.forEach(ag=>{
  const grp = new THREE.Group(); grp.position.set(...ag.pos); scene.add(grp);
  const desk = makeDesk(); desk.position.z = 0.7; grp.add(desk);
  const chair = makeChair(); chair.position.z = -0.5; grp.add(chair);
  const person = makePerson({shirt:ag.shirt, hair:ag.hair, standing:false});
  person.position.z = -0.35; grp.add(person);
  // luz de estado (point light por baixo do monitor)
  const stLight = new THREE.PointLight('#3DDC84', 0, 5, 2); stLight.position.set(0,1.6,1.0); grp.add(stLight);
  // label
  const wrap=document.createElement('div'); wrap.className='lbl3d';
  wrap.innerHTML=`<div class="nm">${ag.nome}<span class="role">${ag.role}</span></div><div class="chip c-ok">–</div>`;
  const lblObj=new CSS2DObject(wrap); lblObj.position.set(0,3.0,-0.35); grp.add(lblObj);
  // balão
  const bWrap=document.createElement('div'); const bObj=new CSS2DObject(bWrap); bObj.position.set(0,3.0,-0.35); grp.add(bObj);
  // hit (clique) — caixa invisível ao redor
  const hit=new THREE.Mesh(new THREE.BoxGeometry(2,3.4,2.4),new THREE.MeshBasicMaterial({visible:false}));
  hit.position.set(0,1.6,0); hit.userData={key:ag.key}; grp.add(hit); clickables.push(hit);
  stations[ag.key] = { ag, grp, person, desk, stLight, chip:wrap.querySelector('.chip'), balloon:bWrap, estado:'idle' };
});

// ---------- sala de vidro do Mauro (o chefe) ----------
const sala = new THREE.Group(); sala.position.set(9.5,0,1.5); scene.add(sala);
// piso da sala
const salaFloor=new THREE.Mesh(new THREE.PlaneGeometry(7,9),new THREE.MeshStandardMaterial({color:'#3a2c4a',roughness:.9}));
salaFloor.rotation.x=-Math.PI/2; salaFloor.position.y=0.03; salaFloor.receiveShadow=true; sala.add(salaFloor);
// vidros (paredes transparentes)
const glassMat=new THREE.MeshPhysicalMaterial({color:'#bfe6ff',transmission:.9,transparent:true,opacity:.22,roughness:.05,metalness:0,thickness:.5});
function glass(w,h,d,x,y,z){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),glassMat);m.position.set(x,y,z);sala.add(m);
  // moldura
  const fr=new THREE.Mesh(new THREE.BoxGeometry(w+0.06,0.08,d+0.06),new THREE.MeshStandardMaterial({color:'#e9c98f',metalness:.4,roughness:.4}));
  fr.position.set(x,y-h/2,z); sala.add(fr); fr.clone&&0;}
glass(7,3,0.1,0,1.6,-4.4);   // fundo
glass(0.1,3,9,3.4,1.6,0);    // direita
glass(0.1,3,3.2,-3.4,1.6,-3.3); // esquerda (parcial — deixa porta)
glass(7,3,0.1,0,1.6,4.4);    // frente parcial via separação
// placa CHEFIA
const chefLbl=document.createElement('div'); chefLbl.className='lbl3d';
chefLbl.innerHTML='<div class="nm" style="background:#3a2c12;border-color:#7c5e24;color:#e9c98f;letter-spacing:1px">👔 SUPERVISÃO</div>';
const chefObj=new CSS2DObject(chefLbl); chefObj.position.set(9.5,3.6,-2.9); scene.add(chefObj);
// mesa do chefe
const mesaChefe=makeDesk(); mesaChefe.position.set(9.5,0,-2.6); mesaChefe.scale.set(1.1,1.1,1.1); scene.add(mesaChefe);
mesaChefe.userData.scrMat.color.set('#1a3a2a'); mesaChefe.userData.scrMat.emissive.set('#1a3a2a');

// Mauro (em pé, terno, gravata dourada)
const mauro = makePerson({shirt:'#22304a', hair:'#2a2018', standing:true, tie:'#e9c98f'});
mauro.position.set(9.5,0,1.5); scene.add(mauro);
const mauroLbl=document.createElement('div'); mauroLbl.className='lbl3d';
mauroLbl.innerHTML='<div class="nm">Mauro<span class="role">O Supervisor · vigia 24/7</span></div><div class="chip c-boss">VIGIANDO</div>';
const mauroObj=new CSS2DObject(mauroLbl); mauroObj.position.set(0,3.05,0); mauro.add(mauroObj);
const mauroHit=new THREE.Mesh(new THREE.BoxGeometry(1.6,3.6,1.6),new THREE.MeshBasicMaterial({visible:false}));
mauroHit.position.y=1.7; mauroHit.userData={key:'mauro'}; mauro.add(mauroHit); clickables.push(mauroHit);
// holofote na sala do chefe
const spot=new THREE.SpotLight('#fff0d0',0.8,16,Math.PI/5,.5,1); spot.position.set(9.5,7,1.5);
spot.target.position.set(9.5,0,0); scene.add(spot); scene.add(spot.target);

// patrulha do Mauro
const patrol = { a:new THREE.Vector3(9.5,0,4.0), b:new THREE.Vector3(9.5,0,-1.2), t:0, dir:1, alvo:null, voltando:false };

// ---------- estados / dados ----------
let DADOS=null, tclock=0;
function setEstado(key, estado, detalhe){
  const s=stations[key]; if(!s) return; s.estado=estado; s.detalhe=detalhe||'';
  const COR={ idle:['#3DDC84','na escuta ☕','c-ok'], typing:['#23a6e0','DIGITANDO…','c-type'],
    erro:['#ff4040','ERRO!','c-err'], zzz:['#3a4e8e','DORMINDO','c-zzz'] };
  const [cor,txt,cls]=COR[estado];
  s.chip.textContent=txt; s.chip.className='chip '+cls;
  s.desk.userData.scrMat.color.set(estado==='erro'?'#3a0e12':estado==='typing'?'#0e3a52':estado==='zzz'?'#101018':'#0e2a22');
  s.desk.userData.scrMat.emissive.set(estado==='erro'?'#6b1220':estado==='typing'?'#15618a':estado==='zzz'?'#0a0a12':'#10331f');
  s.stLight.color.set(cor); s.stLight.intensity = estado==='zzz'?0.15:(estado==='erro'?2.2:1.1);
  s.desk.userData.cup.visible = estado==='idle';
  // balão
  s.balloon.innerHTML = estado==='erro' ? '<div class="balloon err">⚠️ ERRO!</div>'
    : estado==='typing' ? '<div class="balloon">⌨️ …</div>'
    : estado==='zzz' ? '<div class="balloon" style="background:#1c2440;color:#9bb7ff;border-color:#34487e">💤</div>' : '';
}

async function atualizar(){
  try{
    const r=await fetch(STATUS_URL+'?t='+Date.now()); DADOS=await r.json();
    let w=0,er=0,id=0,erroKey=null;
    (DADOS.agentes||[]).forEach(a=>{
      let estado='idle';
      if(!a.ativo) estado='zzz';
      else if(a.ultima){
        const age=(Date.now()-new Date(a.ultima.ts).getTime())/60000;
        if(a.ultima.status===3 && age<60) estado='erro';
        else if(age<10) estado='typing';
      }
      if(estado==='typing')w++; else if(estado==='erro'){er++; erroKey=a.key;} else if(estado==='idle')id++;
      setEstado(a.key, estado, a.ultima?`Última execução: ${new Date(a.ultima.ts).toLocaleString('pt-BR')} · ${a.ultima.status===1?'sucesso ✅':'ERRO ⚠️'} · ${a.ultima.ops} operações`:'sem execuções recentes');
    });
    setEstado('hubspot','zzz','Em desenho — aguardando acessos da seguradora (cartão 17). Acorda quando a integração for construída. 😴');
    hWork.textContent=w; hErr.textContent=er; hIdle.textContent=id; hTime.textContent=new Date().toLocaleTimeString('pt-BR');
    // Mauro reage: se há erro, vai até o agente; senão patrulha
    patrol.alvo = erroKey ? stations[erroKey].grp.position.clone() : null;
    hBoss.textContent = erroKey ? 'socorrendo '+stations[erroKey].ag.nome : 'vigiando';
    toast.textContent = er>0 ? '⚠️ Mauro detectou erro e foi até o agente — clica nele pra ver' : '✅ tudo no ar · Mauro patrulhando · status real do Make';
  }catch(e){ toast.textContent='falha ao falar com o Make: '+e; }
}
const hWork=document.getElementById('hWork'),hErr=document.getElementById('hErr'),hIdle=document.getElementById('hIdle'),
  hTime=document.getElementById('hTime'),hBoss=document.getElementById('hBoss'),toast=document.getElementById('toast');
atualizar(); setInterval(atualizar,60000);

// ---------- clique ----------
const ray=new THREE.Raycaster(), mouse=new THREE.Vector2();
const ov=document.getElementById('ov'), md=document.getElementById('md');
function abrir(html){ md.innerHTML=html+'<button class="fechar" onclick="document.getElementById(\'ov\').classList.remove(\'show\')">fechar</button>'; ov.classList.add('show'); }
ov.addEventListener('click',e=>{ if(e.target===ov) ov.classList.remove('show'); });
renderer.domElement.addEventListener('pointerdown',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(clickables,false)[0];
  if(!hit) return;
  const u=hit.object.userData;
  if(u.tv){ const t=TVS[u.tv]; abrir(`<h2>${t[0]}</h2><p>${t[1]}</p><p><a href="${t[2]}" target="_blank">abrir o painel →</a></p>`); }
  else if(u.pilha){ abrir(`<h2>📂 Pilha de pendências — falta automatizar</h2><ul>${PENDENCIAS.map(p=>`<li>${p}</li>`).join('')}</ul><p>Detalhes no <a href="../automacoes/" target="_blank">painel de automações</a> (filtro 🖐️ Falta automatizar).</p>`); }
  else if(u.key==='mauro'){ abrir(`<h2>👔 Mauro, o Supervisor</h2>
    <p>Vigia os agentes <b>24/7 na nuvem</b>. Se algum cair, religa sozinho, ajusta a vazão pra não estourar o Pipedrive e avisa no Discord <b>#🤖-automações</b>. Roda de hora em hora — não depende do PC ligado.</p>
    <p>Quando algum agente dá erro, o Mauro <b>sai da sala e vai até a mesa dele</b> (é o que você vê aqui). 😎</p>
    <p><a href="https://claude.ai/code/routines/trig_01P13QGf66X79wRyEipHuXbP" target="_blank">abrir a rotina do Mauro →</a></p>`); }
  else if(u.key){ const s=stations[u.key]; const a=(DADOS?.agentes||[]).find(x=>x.key===u.key);
    abrir(`<h2>👤 ${s.ag.nome} <span style="font-size:11px;color:#bfa9d6">· ${s.ag.role}</span></h2>
    <p>${s.detalhe||'…'}</p>
    ${a?`<p>Cenário Make: <a href="https://us2.make.com/436138/scenarios/${a.id}/edit" target="_blank">#${a.id} — abrir HISTORY</a> · ativo: ${a.ativo?'sim':'NÃO'}</p>`:''}
    <p style="color:#9b87b8">DIGITANDO = rodou nos últimos 10 min · ERRO = última execução falhou · DORMINDO = desligado (o Mauro religa sozinho) · ☕ = na escuta.</p>`); }
});

// ---------- animação ----------
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(); tclock+=dt;
  // agentes digitando: braços e cabeça mexem
  Object.values(stations).forEach(s=>{
    const p=s.person.userData.parts;
    if(s.estado==='typing'){
      const f=Math.sin(tclock*12);
      p.armL.rotation.x = -0.5 + f*0.25; p.armR.rotation.x = -0.5 - f*0.25;
      p.head.position.y = p.parts? p.head.position.y : p.head.position.y;
      s.person.position.y = Math.sin(tclock*6)*0.02;
    } else if(s.estado==='zzz'){
      s.person.rotation.z = 0.12 + Math.sin(tclock*1.5)*0.02; s.person.position.y=0;
      p.armL.rotation.x=0; p.armR.rotation.x=0;
    } else {
      s.person.rotation.z=0; s.person.position.y=Math.sin(tclock*2)*0.01;
      p.armL.rotation.x=0; p.armR.rotation.x=0;
    }
  });
  // Mauro: vai até alvo (erro) ou patrulha
  const mp=mauro.position;
  let destino;
  if(patrol.alvo){ destino=new THREE.Vector3(patrol.alvo.x, 0, patrol.alvo.z+2.2); }
  else {
    patrol.t += dt*0.22*patrol.dir;
    if(patrol.t>=1){patrol.t=1;patrol.dir=-1;} if(patrol.t<=0){patrol.t=0;patrol.dir=1;}
    destino=patrol.a.clone().lerp(patrol.b, patrol.t);
  }
  const prevx=mp.x, prevz=mp.z;
  mp.x += (destino.x-mp.x)*Math.min(1,dt*2.2);
  mp.z += (destino.z-mp.z)*Math.min(1,dt*2.2);
  // vira pra direção do movimento
  const dx=mp.x-prevx, dz=mp.z-prevz;
  if(Math.abs(dx)+Math.abs(dz)>0.0006){ mauro.rotation.y = Math.atan2(dx,dz); }
  // pernas do Mauro andando
  if(mauro.userData.legs){ const moving=(Math.abs(dx)+Math.abs(dz))>0.002; const sw=moving?Math.sin(tclock*9)*0.5:0;
    mauro.userData.legs[0].rotation.x=sw; mauro.userData.legs[1].rotation.x=-sw;
    mauro.userData.parts.armL.rotation.x=-sw; mauro.userData.parts.armR.rotation.x=sw; }
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
animate();
document.getElementById('loading').style.display='none';

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
