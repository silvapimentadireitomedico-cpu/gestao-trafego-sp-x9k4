const TVS={
  orcamento:['📺 Dashboard de Orçamento','Atualiza sozinho a cada 30 min (GitHub Actions).','https://silvapimentadireitomedico-cpu.github.io/gestao-trafego-sp-x9k4/'],
  juridico:['📺 Dashboard Jurídico','Na TV do escritório 24/7, atualiza a cada 30s.','https://silvapimentadireitomedico-cpu.github.io/dashboard-juridico-silva-pimenta/'],
  encerr:['📺 Dashboard Encerramentos','Aba mensal automática.','https://silvapimentadireitomedico-cpu.github.io/dashboard-encerramentos-silva-pimenta/'],
};

// ---- ciclo do dia (cadencia) + LINKS ESTAVEIS dos outputs (sem 404 por data) ----
const CAD={1:'aux-moradia',2:'fies',3:'seguro',4:'direito-medico'};                 // 1=seg ... 4=qui
const PASTA={'aux-moradia':'auxilio-moradia','fies':'fies','seguro':'seguro','direito-medico':'direito-medico'};
const DISP={'aux-moradia':'Auxílio Moradia','fies':'FIES','seguro':'Seguro · MG','direito-medico':'Direito Médico'};
const RITA_BASE='https://rita-sp.pages.dev',WJ_BASE='https://william-jr-sp.pages.dev',TH_BASE='https://thainar-sp.pages.dev';
function ritaURL(slug){return RITA_BASE+'/'+slug+'/';}            // index.html redireciona pro relatorio mais novo
function wjURL(slug){return WJ_BASE+'/'+PASTA[slug]+'/';}         // index.html redireciona pra proposta mais nova
function thURL(slug){return TH_BASE+'/'+PASTA[slug]+'/';}         // galeria das artes em novas-para-teste
function cicloAtual(){ const d=new Date(); for(let i=0;i<7;i++){ const x=new Date(d); x.setDate(d.getDate()-i); const s=CAD[x.getDay()]; if(s) return {slug:s,hoje:i===0,dataLabel:x.toLocaleDateString('pt-BR')}; } return null; }
function renderPainel(){
  const el=document.getElementById('painel'); if(!el) return;
  const c=cicloAtual();
  if(!c){ el.innerHTML='<span class="lbl">🗓️ Sem ciclo na cadência hoje (cadência seg→qui)</span>'; return; }
  el.innerHTML='<span class="lbl">📌 Ciclo: '+DISP[c.slug]+' <em>· '+c.dataLabel+' ('+(c.hoje?'hoje':'último')+')</em></span>'+
    '<a href="'+ritaURL(c.slug)+'" target="_blank">📊 Relatório da <b>Rita</b></a>'+
    '<a href="'+wjURL(c.slug)+'" target="_blank">🤖 Proposta do <b>William JR</b></a>'+
    '<a href="'+thURL(c.slug)+'" target="_blank">🎨 Artes da <b>Thainar</b></a>';
}

// ---- helpers de desenho ----
function r(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }
function ro(x,y,w,h,c,o=2,oc='#14101e'){ r(x-o,y-o,w+o*2,h+o*2,oc); r(x,y,w,h,c); }
function shadow(cx,cy,w){ ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(cx,cy,w,w*0.32,0,0,7); ctx.fill(); }
function text(s,x,y,size,c,align='center',weight=700){ ctx.font=weight+' '+Math.round(size*1.5)+"px Inter, system-ui, Arial"; ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillText(s,x+0.7,y+0.7); ctx.fillStyle=c; ctx.fillText(s,x,y); }

function drawFloor(){
  const T=34;
  for(let j=0;j<Math.ceil(H/T);j++) for(let i=0;i<Math.ceil(W/T);i++){ r(i*T,j*T,T,T,(i+j)%2?'#a8a8b0':'#9a9aa2'); }
  r(0,0,W,84,'#7d7f8c'); r(0,84,W,5,'#5a5c68');
}

// placa de nome + anel do escritório
function nameTag(ag,cx,topY){
  const npW=Math.max(ag.nome.length*11+16, ag.tag.length*6+16, 70);
  if(ag.esc){ r(cx-npW/2-4, topY-4, npW+8, 34, ESC[ag.esc]); } // anel do escritório
  ro(cx-npW/2, topY, npW, 26, ag.plate, 2);
  r(cx-npW/2, topY+20, npW, 6, 'rgba(0,0,0,.28)');
  text(ag.nome, cx, topY+12, 8, '#fff');
  text(ag.tag,  cx, topY+23, 4.6, '#ffe9b0');
}

function drawHeadTorso(ag,x,y,sleeping){
  ro(x-23,y+4,46,24,ag.shirt,2); r(x-23,y+16,46,12,ag.shirt2);
  ro(x-30,y+8,9,18,ag.shirt,2); ro(x+21,y+8,9,18,ag.shirt,2);
  r(x-5,y-2,10,8,'#e0a578');
  ro(x-14,y-28,28,26,'#e8b88a',2);
  r(x-16,y-32,32,11,ag.hair); r(x-16,y-32,5,18,ag.hair); r(x+11,y-32,5,18,ag.hair);
  if(sleeping){ r(x-9,y-16,7,2,'#14101e'); r(x+3,y-16,7,2,'#14101e'); }
  else { r(x-9,y-18,5,5,'#14101e'); r(x+4,y-18,5,5,'#14101e'); }
  r(x-4,y-8,8,2,'#b06a4a');
}

// agente na MESA (ativo / ocioso-na-mesa / erro)
function drawWorker(ag,t){
  const x=ag.x,y=ag.y;
  shadow(x,y+58,52);
  const bob = ag.estado==='typing'?Math.sin(t/110)*1.5:Math.sin(t/600)*0.6;
  const hy=y-22+bob;
  drawHeadTorso(ag,x,hy+12,false);
  const dy=y+24;
  ro(x-50,dy,100,30,'#8a5a31',2); r(x-50,dy+22,100,8,'#6d4423');
  r(x-46,dy+30,10,18,'#5a3a1e'); r(x+36,dy+30,10,18,'#5a3a1e');
  const scr= ag.estado==='erro'?'#ff4d4d': ag.estado==='typing'?'#36c2ff': ag.estado==='zzz'?'#2a3050':'#3DDC84';
  ro(x-22,dy-22,44,28,'#15151f',2);
  const flick= ag.estado==='typing'?(Math.sin(t/120)>0?1:.6):1;
  ctx.globalAlpha=flick; r(x-18,dy-18,36,20,scr); ctx.globalAlpha=1;
  r(x-3,dy+6,6,4,'#15151f'); r(x-8,dy+10,16,3,'#15151f');
  r(x-16,dy+10,32,6,'#d9d9e2');
  const hp= ag.estado==='typing'?Math.sin(t/90)*2:0;
  r(x-14,dy+8+hp,8,5,'#e8b88a'); r(x+6,dy+8-hp,8,5,'#e8b88a');
  if(ag.estado==='idle'){ r(x+34,dy-6,9,11,'#f4ead2'); r(x+43,dy-3,3,5,'#c9b48c'); }
  nameTag(ag,x,hy-52);
  drawStatus(ag,x,hy-66,t);
  ag._hit={x:x-50,y:hy-58,w:100,h:y+74-(hy-58)};
}

// agente FORA da mesa: jogando ping-pong (idle) ou no sofá (dormindo)
function drawLounger(ag,x,y,mode,t){
  shadow(x,y+30,24);
  const sl= mode==='sofa';
  drawHeadTorso(ag,x,y,sl);
  if(mode==='pingpong'){ const sw=Math.sin(t/130)*3; r(x+20,y+2+sw,4,11,'#7a4a22'); ro(x+16,y-9+sw,13,12,'#c0392b',1); }
  nameTag(ag,x,y-44);
  if(sl){ text('z',x+18,y-30-((t/400)%12),8,'#9bb7ff'); text('Z',x+25,y-38-((t/300)%16),10,'#bcd0ff'); }
  ag._hit={x:x-24,y:y-46,w:48,h:82};
}

function drawStatus(ag,x,y,t){
  if(ag.estado==='typing'){ drawGear(x+30,y+6,t); bubble(x,y,'#1b1f33','#5fd0ff','• • •'); }
  else if(ag.estado==='erro'){ const sh=Math.sin(t/70)*2; bubble(x+sh,y,'#3a1012','#ff6b6b','! ERRO'); }
  else if(ag.estado==='zzz'){ text('z',x+14,y+2-((t/400)%12),9,'#9bb7ff'); text('Z',x+22,y-6-((t/300)%16),11,'#bcd0ff'); }
  else { bubble(x,y,'#13331f','#7be0a0','☕'); }
}
function bubble(x,y,bg,fg,txt){ const w=Math.max(40,txt.length*8+18); ro(x-w/2,y-16,w,18,bg,2,'#0c0f18'); text(txt,x,y-3,8,fg); r(x-3,y+2,8,4,bg); }
function drawGear(x,y,t){ ctx.save(); ctx.translate(x,y); ctx.rotate((t/600)%(Math.PI*2)); ctx.fillStyle='#5aa9ff'; for(let i=0;i<8;i++){ ctx.rotate(Math.PI/4); ctx.fillRect(-2,-9,4,5); } ctx.restore(); r(x-5,y-5,10,10,'#7bc0ff'); r(x-2,y-2,4,4,'#1b2236'); }

// ---- loop ----
function update(dt){
  // Em pé no posto vigiando; só sai correndo até a mesa quando um agente dá erro.
  const dest = mauro.alvo ? {x:mauro.alvo.x, y:mauro.alvo.y+72} : VIGIA;
  const k=Math.min(1,dt*0.0032);
  if(!mauro.alvo && Math.hypot(dest.x-mauro.x,dest.y-mauro.y)<6){
    // parado no posto: varre o ambiente virando a cabeça devagar pros lados
    mauro.scan+=dt; if(mauro.scan>1400){ mauro.scan=0; mauro.face=-mauro.face; }
  } else {
    mauro.face=(dest.x<mauro.x-0.5)?-1:(dest.x>mauro.x+0.5?1:mauro.face);
  }
  mauro.x+=(dest.x-mauro.x)*k; mauro.y+=(dest.y-mauro.y)*k;
}

cv.addEventListener('pointerdown',e=>{
  const rect=cv.getBoundingClientRect(); const mx=(e.clientX-rect.left)/scale, my=(e.clientY-rect.top)/scale;
  for(let i=HITS.length-1;i>=0;i--){ const h=HITS[i]; if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){
    if(h.tv==='conexoes'){ conexoesModal(); return; }

    if(h.pilha){ abrir(pend()); return; }
    if(h.key==='mauro'){ abrir(`<h2>👔 Mauro, o Supervisor</h2><p>Fica <b>em pé no posto vigiando</b> os 3 setores na nuvem. Quando um agente dá erro, ele corre até a mesa, religa sozinho o que dá pra religar, ajusta a vazão e avisa no Discord <b>#🤖-automações</b>.</p>
      <h2 style="font-size:14px;margin-top:12px">O que ele vigia (e o que faz em cada caso)</h2>
      <ul>
        <li><b>Cenário Make caído</b> (Téo, Aurora, Fábio, Sueli): <b>religa sozinho</b>, de hora em hora, 24/7. Se religar e não voltar, te chama (@here + WhatsApp).</li>
        <li><b>Cenário Make INVÁLIDO</b> (blueprint quebrado, ex.: edição com fórmula errada — caso do Cad. Auxílio em 09/07): religar NÃO resolve. Ele te chama com o playbook: <b>restaurar o backup</b> em <code>operacao/backups/blueprint-&lt;id&gt;-*.json</code> e ativar de novo.</li>
        <li><b>Cenário errando em série</b> (3+ erros na última hora, ex.: Digisac instável): avisa qual módulo está falhando — lead pode estar se perdendo; dá pra reprocessar no histórico do Make.</li>
        <li><b>Dashboard de Vendas do comercial parado</b> (+45 min sem atualizar em horário comercial): avisa — a Tarefa Agendada "Dashboard Vendas SP" roda no PC do William de 10 em 10 min.</li>
        <li><b>Rita e William JR</b>: 1x/dia na ronda das <b>9h</b>, confere se o relatório/proposta do dia saiu; se faltou, te chama no WhatsApp.</li>
        <li><b>Hugo (Seguralta)</b>: healthcheck do acesso ao HubSpot a cada ronda.</li>
      </ul>
      <p class="role">Não é tempo real: o ciclo base é de 1 em 1 hora (foi feito pra nunca passar de 1h sem ninguém ver).</p>
      <p><a href="https://claude.ai/code/routines/trig_01P13QGf66X79wRyEipHuXbP" target="_blank">abrir a rotina do Mauro →</a></p>`); return; }
    if(h.key==='rita-sp'){ abrir(ritaModal('sp')); return; }
    if(h.key==='rita-mg'){ abrir(ritaModal('mg')); return; }
    if(h.key==='validador'){ const a=AGENTES.find(x=>x.key==='validador'); abrir(`<h2>🛡 ${a.nome} · ${a.tag}</h2><p class="role">${a.role}</p><h2 style="font-size:14px;margin-top:12px">Último veredito</h2>${saidaModal(window.VALIDADOR_ULTIMO,'',[['Item','item'],['Veredito','veredito'],['Motivo','motivo'],['Risco','risco'],['Reescrita','reescrita']])}`); return; }
    if(h.key==='redator'){ const a=AGENTES.find(x=>x.key==='redator'); abrir(`<h2>✍️ ${a.nome} · copy</h2><p class="role">${a.role}</p><h2 style="font-size:14px;margin-top:12px">Última copy</h2>${saidaModal(window.REDATOR_ULTIMA,'',[['Produto','produto'],['Headline','headline'],['Texto','texto'],['CTA','cta'],['Caracteres','caracteres']])}`); return; }
    if(h.key==='creativemeta'){ abrir(claraModal()); return; }
    if(h.key==='gmeta'){ abrir(wjModal()); return; }
    const a=AGENTES.find(x=>x.key===h.key); const d=(DADOS?.agentes||[]).find(x=>x.key===h.key);
    abrir(`<h2>👤 ${a.nome} <span class="role">· ${a.tag}${a.esc?' · '+(a.esc==='sp'?'Silva Pimenta':'Magalhães Gomes'):''}</span></h2><p class="role">${a.role}</p><p>${a.detalhe||'…'}</p>${d?`<p>Cenário Make: <a href="https://us2.make.com/436138/scenarios/${d.id}/edit" target="_blank">#${d.id}</a> · ativo: ${d.ativo?'sim':'NÃO'}</p>`:''}<p class="role">DIGITANDO = rodou nos últimos 10 min · ERRO = última falhou (Mauro religa) · 😴 DORMINDO = desligado · ☕ = na escuta.</p>`); return;
  } }
});
(document.fonts?document.fonts.ready:Promise.resolve()).then(()=>{ document.getElementById('loading').style.display='none'; resize(); atualizar(); setInterval(atualizar,60000); requestAnimationFrame(loop); });
