<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escritório Virtual — Agentes Silva Pimenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#11101a;font-family:'Press Start 2P',monospace;color:#fff;overflow:hidden;
    display:flex;flex-direction:column;align-items:center}
  /* topo */
  .top{position:fixed;top:0;left:0;right:0;z-index:10;padding:10px 12px;pointer-events:none;
    background:linear-gradient(180deg,rgba(10,9,20,.9),transparent)}
  .title{text-align:center;font-size:13px;color:#ffd54a;text-shadow:2px 2px 0 #000;letter-spacing:1px}
  .hud{display:flex;gap:6px;justify-content:center;margin-top:9px;flex-wrap:wrap;pointer-events:auto}
  .hud span{background:#1b2236;border:2px solid #36406a;padding:6px 10px;font-size:8px;border-radius:3px;
    box-shadow:0 3px 0 #0a0d18;line-height:1.4}
  .hud b{color:#ffd54a}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#9a9aa2;
    box-shadow:0 0 0 4px #0a0d18,0 18px 50px rgba(0,0,0,.7)}
  .foot{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;
    background:#1b2236;border:2px solid #36406a;color:#cdbbe2;font-size:8px;padding:7px 12px;border-radius:3px;
    box-shadow:0 3px 0 #0a0d18;line-height:1.5;text-align:center}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(8,5,15,.85);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .overlay.show{display:flex}
  .modal{background:#171a2e;border:3px solid #ffd54a;border-radius:6px;max-width:540px;width:100%;padding:22px;
    font-size:10px;line-height:1.9;box-shadow:0 10px 0 #0a0d18}
  .modal h2{color:#ffd54a;font-size:12px;margin-bottom:12px;line-height:1.5}
  .modal p,.modal li{color:#dcd3f0;font-family:'Inter',system-ui,sans-serif;font-size:12.5px;line-height:1.7}
  .modal ul{padding-left:18px;margin:8px 0}
  .modal a{color:#5fe39a}
  .modal .role{color:#9b87b8;font-size:10px}
  .modal .fechar{margin-top:16px;background:#ffd54a;color:#171a2e;border:none;padding:9px 16px;
    font-family:'Press Start 2P';font-size:9px;cursor:pointer;border-radius:4px;box-shadow:0 3px 0 #b8932c}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;
    background:#11101a;color:#ffd54a;font-size:11px;text-align:center;line-height:2}
</style>
</head>
<body>
  <div id="loading">CARREGANDO<br>ESCRITÓRIO…</div>
  <div class="top">
    <div class="title">🏢 ESCRITÓRIO VIRTUAL · SILVA PIMENTA</div>
    <div class="hud">
      <span>🟢 ATIVO <b id="hWork">–</b></span>
      <span>☕ OCIOSO <b id="hIdle">–</b></span>
      <span>⚠️ ERRO <b id="hErr">–</b></span>
      <span>👔 MAURO <b id="hBoss">–</b></span>
      <span>🕐 <b id="hTime">–</b></span>
    </div>
  </div>
  <div id="wrap"><canvas id="cv" width="1024" height="700"></canvas></div>
  <div class="foot" id="toast">conectando ao Make…</div>
  <div class="overlay" id="ov"><div class="modal" id="md"></div></div>

<script>
const STATUS_URL = 'https://sp-tag-lead-filter-x7k2.pages.dev/status';
const W=1024, H=700;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

// ---- agentes (key bate com /status) ----
const AGENTES=[
  {key:'taglead',nome:'TÉO',  role:'Tag Lead · capta WhatsApp', x:300,y:210, shirt:'#1f7fa6',shirt2:'#155b78',hair:'#3a2415',plate:'#7a3aa8'},
  {key:'cadaux', nome:'AURORA',role:'Cadastro Auxílio Moradia', x:470,y:210, shirt:'#9a48d0',shirt2:'#6f2ea0',hair:'#141414',plate:'#2b6fb0'},
  {key:'cadfies',nome:'FÁBIO', role:'Cadastro FIES',            x:640,y:210, shirt:'#e08a2a',shirt2:'#b3691a',hair:'#5a3214',plate:'#cf5a2a'},
  {key:'cadsusp',nome:'SUELI', role:'Cadastro Suspensão FIES',  x:385,y:400, shirt:'#2e9d5f',shirt2:'#1d6e41',hair:'#241a10',plate:'#2e7d4f'},
  {key:'hubspot',nome:'HUGO',  role:'HubSpot (em breve)',       x:555,y:400, shirt:'#7a7a8a',shirt2:'#55555f',hair:'#3a3a3a',plate:'#6b6b78',fixo:'zzz'},
];
const PENDENCIAS=[
  '#14 UTM Tracking — implementar nível 1',
  '#16 Bot IA Magalhães — deploy Fly.io (vira agente 24/7)',
  '#17 HubSpot × Pipedrive — aguardando acessos da seguradora',
];
const TVS={
  orcamento:['📺 Dashboard de Orçamento','Atualiza sozinho a cada 30 min (GitHub Actions).','https://silvapimentadireitomedico-cpu.github.io/gestao-trafego-sp-x9k4/'],
  juridico:['📺 Dashboard Jurídico','Na TV do escritório 24/7, atualiza a cada 30s.','https://silvapimentadireitomedico-cpu.github.io/dashboard-juridico-silva-pimenta/'],
  encerr:['📺 Dashboard Encerramentos','Aba mensal automática.','https://silvapimentadireitomedico-cpu.github.io/dashboard-encerramentos-silva-pimenta/'],
};

// ---- helpers de desenho ----
function r(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }
function ro(x,y,w,h,c,o=2,oc='#14101e'){ r(x-o,y-o,w+o*2,h+o*2,oc); r(x,y,w,h,c); } // bloco com contorno
function shadow(cx,cy,w){ ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(cx,cy,w,w*0.32,0,0,7); ctx.fill(); }
function text(s,x,y,size,c,align='center'){ ctx.font=size+"px 'Press Start 2P'"; ctx.textAlign=align;
  ctx.fillStyle='#000'; ctx.fillText(s,x+1,y+1); ctx.fillStyle=c; ctx.fillText(s,x,y); }

// ---- piso xadrez ----
function drawFloor(){
  const T=32;
  for(let j=0;j<Math.ceil(H/T);j++) for(let i=0;i<Math.ceil(W/T);i++){
    r(i*T,j*T,T,T,(i+j)%2?'#a8a8b0':'#9a9aa2');
  }
  // faixa de parede no topo
  r(0,0,W,84,'#7d7f8c'); r(0,84,W,5,'#5a5c68');
  // rodapé
  r(0,80,W,4,'#6a6c78');
}

// ---- personagem sentado ----
function drawWorker(ag,t){
  const x=ag.x, y=ag.y;
  shadow(x,y+58,52);
  // ---- corpo / cabeça (atrás da mesa) ----
  const bob = ag.estado==='typing' ? Math.sin(t/110)*1.5 : (ag.estado==='zzz'? 0 : Math.sin(t/600)*0.6);
  const hy = y-22+bob;
  // ombros (camisa)
  ro(x-26,hy+16,52,26,ag.shirt,2);
  r(x-26,hy+30,52,12,ag.shirt2); // sombra inferior camisa
  // braços
  ro(x-32,hy+20,10,20,ag.shirt,2); ro(x+22,hy+20,10,20,ag.shirt,2);
  // pescoço
  r(x-5,hy+12,10,8,'#e0a578');
  // cabeça
  ro(x-15,hy-14,30,28,'#e8b88a',2);
  // cabelo
  r(x-17,hy-18,34,12,ag.hair); r(x-17,hy-18,5,20,ag.hair); r(x+12,hy-18,5,20,ag.hair);
  // olhos
  if(ag.estado==='zzz'){ r(x-9,hy-2,8,2,'#14101e'); r(x+2,hy-2,8,2,'#14101e'); }
  else { r(x-9,hy-4,5,5,'#14101e'); r(x+4,hy-4,5,5,'#14101e'); }
  // boca
  r(x-4,hy+6,8,2,'#b06a4a');
  // ---- mesa (na frente) ----
  const dy=y+24;
  ro(x-50,dy,100,30,'#8a5a31',2);          // tampo
  r(x-50,dy+22,100,8,'#6d4423');           // borda
  r(x-46,dy+30,10,18,'#5a3a1e'); r(x+36,dy+30,10,18,'#5a3a1e'); // pernas
  // monitor sobre a mesa
  const scr = ag.estado==='erro'?'#ff4d4d': ag.estado==='typing'?'#36c2ff': ag.estado==='zzz'?'#2a3050':'#3DDC84';
  ro(x-22,dy-22,44,28,'#15151f',2);
  const flick = ag.estado==='typing' ? (Math.sin(t/120)>0?1:.6) : 1;
  ctx.globalAlpha = ag.estado==='zzz'?.5:flick; r(x-18,dy-18,36,20,scr); ctx.globalAlpha=1;
  r(x-3,dy+6,6,4,'#15151f'); r(x-8,dy+10,16,3,'#15151f'); // pé do monitor
  // teclado + mãos digitando
  r(x-16,dy+10,32,6,'#d9d9e2');
  const hpush = ag.estado==='typing' ? Math.sin(t/90)*2 : 0;
  r(x-14,dy+8+hpush,8,5,'#e8b88a'); r(x+6,dy+8-hpush,8,5,'#e8b88a');
  // café (idle)
  if(ag.estado==='idle'){ r(x+34,dy-6,9,11,'#f4ead2'); r(x+43,dy-3,3,5,'#c9b48c'); }
  // ---- placa de nome ----
  const npW = Math.max(54, ag.nome.length*11+16);
  ro(x-npW/2, hy-44, npW, 16, ag.plate, 2);
  text(ag.nome, x, hy-32, 8, '#fff');
  // ---- status flutuante ----
  drawStatus(ag, x, hy-58, t);
  // hit box
  ag._hit={x:x-50,y:hy-46,w:100,h:y+74-(hy-46)};
}

function drawStatus(ag,x,y,t){
  if(ag.estado==='typing'){ // engrenagem girando + balão
    drawGear(x+30, y+6, t);
    bubble(x,y,'#1b1f33','#5fd0ff', ['•','•','•'][Math.floor(t/220)%3]==='•'?'• • •':'• • •');
  } else if(ag.estado==='erro'){
    const sh=Math.sin(t/70)*2;
    bubble(x+sh,y,'#3a1012','#ff6b6b','! ERRO');
  } else if(ag.estado==='zzz'){
    text('z',x+18,y+2-((t/400)%14),9,'#9bb7ff');
    text('Z',x+26,y-6-((t/300)%18),11,'#bcd0ff');
  } else { // idle: balãozinho de café leve
    bubble(x,y,'#13331f','#7be0a0','☕');
  }
}
function bubble(x,y,bg,fg,txt){
  const w=Math.max(40, txt.length*8+18);
  ro(x-w/2,y-16,w,18,bg,2,'#0c0f18');
  text(txt,x,y-3,8,fg);
  r(x-3,y+2,8,4,bg); // rabinho
}
function drawGear(x,y,t){
  ctx.save(); ctx.translate(x,y); ctx.rotate((t/600)%(Math.PI*2));
  ctx.fillStyle='#5aa9ff';
  for(let i=0;i<8;i++){ ctx.rotate(Math.PI/4); ctx.fillRect(-2,-9,4,5); }
  ctx.restore();
  r(x-5,y-5,10,10,'#7bc0ff'); r(x-2,y-2,4,4,'#1b2236');
}

// ---- decorações ----
function plant(x,y){ shadow(x,y+16,16); ro(x-9,y,18,14,'#a3502e',2); r(x-7,y+2,14,4,'#7c3a20');
  ro(x-12,y-20,24,22,'#2e9d52',2); r(x-3,y-20,6,22,'#1d6e36'); }
function pottedTall(x,y){ shadow(x,y+22,14); ro(x-8,y,16,22,'#c0703a',2);
  r(x-3,y-30,6,30,'#1d6e36'); r(x-12,y-22,10,5,'#2e9d52'); r(x+2,y-30,10,5,'#2e9d52'); r(x-14,y-12,12,5,'#2e9d52'); }
function window_(x,y){ ro(x-40,y,80,46,'#5a5c68',3); r(x-36,y+4,72,38,'#8fd0f5');
  r(x-36,y+22,72,4,'#5a5c68'); r(x-2,y+4,4,38,'#5a5c68');
  r(x-30,y+9,16,6,'#cfeaff'); r(x-30,y+9,16,6,'rgba(255,255,255,.5)'); }
function tvWall(x,y,key,label){ shadow(x,y+30,30);
  ro(x-34,y,68,40,'#0c0c14',3); r(x-30,y+4,60,28,'#10202a');
  // barrinhas
  r(x-24,y+9,40,4,'#ffd54a'); r(x-24,y+16,28,4,'#3DDC84'); r(x-24,y+23,34,4,'#7bb6ff');
  r(x+24,y+3,4,4,'#3DDC84'); // led
  text(label,x,y+54,7,'#d8c8ea');
  HITS.push({x:x-34,y:y,w:68,h:40,tv:key});
}
function vending(x,y){ shadow(x,y+56,24); ro(x-26,y,52,72,'#c0202a',3);
  r(x-22,y+4,34,42,'#1b1f2e'); // vidro
  const cols=['#ff5d5d','#ffd54a','#5fd0ff','#7be0a0'];
  for(let j=0;j<4;j++)for(let i=0;i<3;i++) r(x-19+i*11,y+8+j*9,8,6,cols[(i+j)%4]);
  r(x+14,y+6,8,40,'#2a2f3e'); // painel
  text('SNAX',x-4,y+62,6,'#ffd54a'); }
function bookshelf(x,y){ shadow(x,y+34,30); ro(x-30,y,60,44,'#7a4a22',3);
  const bc=['#c0392b','#2980b9','#27ae60','#e0a82a','#8e44ad','#c0392b','#16a085'];
  for(let s=0;s<2;s++) for(let i=0;i<7;i++){ r(x-26+i*8,y+4+s*20,6,16,bc[(i+s)%7]); }
  r(x-30,y+22,60,3,'#5a3618'); }
function pingpong(x,y){ shadow(x,y+22,46); ro(x-46,y-14,92,34,'#2e8b57',3);
  r(x-2,y-14,4,34,'#fff'); r(x-46,y+2,92,3,'#fff');
  r(x-50,y+18,6,16,'#3a2a18'); r(x+44,y+18,6,16,'#3a2a18'); }
function sofa(x,y){ shadow(x,y+20,40); ro(x-44,y,88,26,'#ffd54a',3); r(x-44,y-12,88,14,'#f0c63a');
  r(x-44,y,8,26,'#e0b62a'); r(x+36,y,8,26,'#e0b62a'); }
function easel(x,y){ shadow(x,y+30,22); r(x-2,y,4,40,'#5a3a1e'); r(x-22,y+38,8,16,'#5a3a1e'); r(x+14,y+38,8,16,'#5a3a1e');
  ro(x-24,y-26,48,34,'#f4ead2',3); // tela
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,y-9,11,0,7); ctx.stroke(); ctx.beginPath(); ctx.arc(x,y-9,5,0,7); ctx.stroke();
  r(x-1,y-10,2,2,'#c0392b'); }
function mascote(x,y,t){ shadow(x,y+14,14); const b=Math.sin(t/300)*2;
  ro(x-10,y-10+b,20,20,'#e0392b',2); r(x-7,y-5+b,5,5,'#fff'); r(x+2,y-5+b,5,5,'#fff');
  r(x-6,y-4+b,2,2,'#000'); r(x+3,y-4+b,2,2,'#000'); r(x-12,y-4+b,3,8,'#e0392b'); r(x+9,y-4+b,3,8,'#e0392b'); }
function whiteboard(x,y){ ro(x-46,y,92,30,'#e8a33a',3); r(x-40,y+5,80,20,'#fff');
  r(x-34,y+10,40,3,'#b0b0c0'); r(x-34,y+16,54,3,'#b0b0c0'); }

// ---- Mauro (chefe, anda) ----
const mauro={x:880,y:430, tx:880,ty:430, face:1, alvo:null,
  pa:{x:880,y:330}, pb:{x:880,y:520}, pt:0, dir:1, walkPhase:0};
function drawBossRoom(){
  // sala do chefe (canto direito-baixo) com tapete + vidro
  r(792,300,232,400,'rgba(90,70,110,.20)');
  ctx.strokeStyle='#ffd54a'; ctx.lineWidth=3; ctx.strokeRect(792,300,230,398);
  r(800,316,216,360,'rgba(150,200,255,.10)'); // vidro
  // tapete
  ctx.fillStyle='#5a3a6a'; ctx.fillRect(820,360,170,260);
  // mesa do chefe
  shadow(880,300,40); ro(842,250,76,26,'#8a5a31',2); r(842,272,76,7,'#6d4423');
  text('👔 SUPERVISÃO',905,326,8,'#ffd54a');
}
function drawMauro(t){
  const x=mauro.x,y=mauro.y;
  shadow(x,y+26,20);
  const moving=Math.abs(mauro.x-mauro._px)+Math.abs(mauro.y-mauro._py)>0.4;
  const step = moving? Math.sin(t/120)*3 : 0;
  // pernas
  r(x-8,y+12+Math.max(0,step),7,16,'#2b2740'); r(x+1,y+12+Math.max(0,-step),7,16,'#2b2740');
  // corpo (terno)
  ro(x-13,y-8,26,24,'#22304a',2); r(x-2,y-6,4,18,'#ffd54a'); // gravata
  // braços
  ro(x-17,y-6,6,18,'#22304a',2); ro(x+11,y-6,6,18,'#22304a',2);
  // cabeça
  ro(x-11,y-30,22,22,'#e8b88a',2);
  r(x-13,y-34,26,9,'#2a2018'); // cabelo
  if(mauro.face>0){ r(x+1,y-24,4,4,'#14101e'); r(x-7,y-24,4,4,'#14101e'); }
  else { r(x-5,y-24,4,4,'#14101e'); }
  // nome
  ro(x-30,y-52,60,15,'#3a2c12',2); text('MAURO',x,y-41,7,'#ffd54a');
  // status
  if(mauro.alvo){ bubble(x,y-58,'#3a1012','#ff8a8a','SOCORRO!'); }
  else { drawGear(x+22,y-44,t); }
  mauro._px=x; mauro._py=y;
  mauro._hit={x:x-22,y:y-54,w:44,h:84};
}

// ---- pilha de pendências ----
const pilha={x:120,y:560};
function drawPilha(t){
  const {x,y}=pilha; shadow(x,y+18,40);
  const cols=['#b98b24','#c99a30','#d9a93e','#e9b94e'];
  cols.forEach((c,i)=>{ const w=70-i*8; ro(x-w/2,y-i*11,w,11,c,2); });
  r(x-22,y-48,44,8,'#f4ead2'); // papel
  ro(x-46,y+18,92,16,'#3a2c12',2); text('📂 '+PENDENCIAS.length+' PEND.',x,y+30,7,'#ffd98a');
  pilha._hit={x:x-46,y:y-48,w:92,h:96};
}

// ---- FPS ----
let frames=0,fps=0,lastFps=performance.now();
function drawFps(now){ frames++; if(now-lastFps>500){ fps=Math.round(frames*1000/(now-lastFps)); frames=0; lastFps=now; }
  ro(8,8,108,20,'#0c1018',2); text(fps+' FPS',62,22,9,fps>=45?'#7be07b':'#ffd54a'); }

// ---- HITS (clique) ----
let HITS=[];

// ---- estado / dados ----
let DADOS=null;
function setEstado(key,estado,detalhe){ const a=AGENTES.find(x=>x.key===key); if(!a)return; a.estado=estado; a.detalhe=detalhe; }
AGENTES.forEach(a=>a.estado='idle');

async function atualizar(){
  try{
    const rr=await fetch(STATUS_URL+'?t='+Date.now()); DADOS=await rr.json();
    let w=0,er=0,id=0,erroKey=null;
    (DADOS.agentes||[]).forEach(a=>{
      let e='idle';
      if(!a.ativo)e='zzz';
      else if(a.ultima){ const age=(Date.now()-new Date(a.ultima.ts).getTime())/60000;
        if(a.ultima.status===3&&age<60)e='erro'; else if(age<10)e='typing'; }
      if(e==='typing')w++; else if(e==='erro'){er++;erroKey=a.key;} else if(e==='idle')id++;
      setEstado(a.key,e,a.ultima?`Última execução: ${new Date(a.ultima.ts).toLocaleString('pt-BR')} · ${a.ultima.status===1?'sucesso':'ERRO'} · ${a.ultima.ops} operações`:'sem execuções recentes');
    });
    setEstado('hubspot','zzz','Em desenho — aguardando acessos da seguradora (cartão 17). 😴');
    document.getElementById('hWork').textContent=w; document.getElementById('hErr').textContent=er;
    document.getElementById('hIdle').textContent=id; document.getElementById('hTime').textContent=new Date().toLocaleTimeString('pt-BR');
    const ag=AGENTES.find(a=>a.key===erroKey);
    mauro.alvo = ag? {x:ag.x,y:ag.y} : null;
    document.getElementById('hBoss').textContent = ag? 'socorrendo '+ag.nome : 'vigiando';
    document.getElementById('toast').textContent = er>0? '⚠️ Mauro foi até o agente com erro — clica nele' : '✅ tudo no ar · Mauro patrulhando · status real do Make · clique nos personagens';
  }catch(e){ document.getElementById('toast').textContent='falha ao falar com o Make: '+e; }
}

// ---- loop ----
function update(dt,t){
  // Mauro: vai até erro ou patrulha
  let dest;
  if(mauro.alvo){ dest={x:mauro.alvo.x, y:mauro.alvo.y+70}; }
  else { mauro.pt+=dt*0.00035*mauro.dir; if(mauro.pt>=1){mauro.pt=1;mauro.dir=-1;} if(mauro.pt<=0){mauro.pt=0;mauro.dir=1;}
    dest={x:mauro.pa.x+(mauro.pb.x-mauro.pa.x)*mauro.pt, y:mauro.pa.y+(mauro.pb.y-mauro.pa.y)*mauro.pt}; }
  const k=Math.min(1,dt*0.004);
  mauro.face = (dest.x<mauro.x-0.5)?-1:(dest.x>mauro.x+0.5?1:mauro.face);
  mauro.x+=(dest.x-mauro.x)*k; mauro.y+=(dest.y-mauro.y)*k;
}
function draw(t){
  HITS=[];
  drawFloor();
  // parede topo: janela, vending, whiteboard
  window_(360,18); vending(940,12); whiteboard(150,30);
  // decorações de chão
  tvWall(120,150,'orcamento','ORÇAMENTO'); tvWall(120,250,'juridico','JURÍDICO'); // 2 na parede esq
  tvWall(700,560,'encerr','ENCERRAMENTOS');
  pottedTall(250,110); plant(880,150); plant(60,420);
  pingpong(150,460); sofa(120,650); bookshelf(720,470); easel(470,560); mascote(40,660,t);
  // agentes clicáveis
  drawBossRoom();
  AGENTES.forEach(a=>drawWorker(a,t));
  drawMauro(t);
  drawPilha(t);
  // registra hits dos agentes/mauro/pilha
  AGENTES.forEach(a=>HITS.push({...a._hit,key:a.key}));
  HITS.push({...mauro._hit,key:'mauro'});
  HITS.push({...pilha._hit,pilha:true});
}
let last=performance.now();
function loop(now){ const dt=now-last; last=now; update(dt,now); draw(now); drawFps(now);
  requestAnimationFrame(loop); }

// ---- clique ----
let scale=1, ox=0, oy=0;
function resize(){ const wrap=document.getElementById('wrap'); const aw=wrap.clientWidth, ah=wrap.clientHeight;
  scale=Math.min(aw/W, ah/H)*0.98; cv.style.width=(W*scale)+'px'; cv.style.height=(H*scale)+'px';
  const rect=cv.getBoundingClientRect(); ox=rect.left; oy=rect.top; }
addEventListener('resize',resize);
const ov=document.getElementById('ov'), md=document.getElementById('md');
function abrir(html){ md.innerHTML=html+'<button class="fechar" onclick="document.getElementById(\'ov\').classList.remove(\'show\')">FECHAR</button>'; ov.classList.add('show'); }
ov.addEventListener('click',e=>{ if(e.target===ov) ov.classList.remove('show'); });
cv.addEventListener('pointerdown',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/scale, my=(e.clientY-rect.top)/scale;
  for(let i=HITS.length-1;i>=0;i--){ const h=HITS[i];
    if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){
      if(h.tv){ const t=TVS[h.tv]; abrir(`<h2>${t[0]}</h2><p>${t[1]}</p><p><a href="${t[2]}" target="_blank">abrir o painel →</a></p>`); return; }
      if(h.pilha){ abrir(`<h2>📂 Pendências — falta automatizar</h2><ul>${PENDENCIAS.map(p=>`<li>${p}</li>`).join('')}</ul><p>Detalhes no <a href="../automacoes/" target="_blank">painel de automações</a>.</p>`); return; }
      if(h.key==='mauro'){ abrir(`<h2>👔 Mauro, o Supervisor</h2><p>Vigia os agentes <b>24/7 na nuvem</b>. Se algum cair, religa sozinho, ajusta a vazão e avisa no Discord <b>#🤖-automações</b>. Quando dá erro, ele <b>vai até a mesa do agente</b> (é o que você vê).</p><p><a href="https://claude.ai/code/routines/trig_01P13QGf66X79wRyEipHuXbP" target="_blank">abrir a rotina do Mauro →</a></p>`); return; }
      const a=AGENTES.find(x=>x.key===h.key); const d=(DADOS?.agentes||[]).find(x=>x.key===h.key);
      abrir(`<h2>👤 ${a.nome} <span class="role">· ${a.role}</span></h2><p>${a.detalhe||'…'}</p>
        ${d?`<p>Cenário Make: <a href="https://us2.make.com/436138/scenarios/${d.id}/edit" target="_blank">#${d.id}</a> · ativo: ${d.ativo?'sim':'NÃO'}</p>`:''}
        <p class="role">DIGITANDO = rodou nos últimos 10 min · ERRO = última execução falhou (o Mauro religa) · DORMINDO = desligado · ☕ = na escuta.</p>`); return;
    }
  }
});

// ---- boot ----
(document.fonts? document.fonts.ready : Promise.resolve()).then(()=>{
  document.getElementById('loading').style.display='none';
  resize(); atualizar(); setInterval(atualizar,60000); requestAnimationFrame(loop);
});
</script>
